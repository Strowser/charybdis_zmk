# RGB Underglow (SK6812 MINI-E LEDs)
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y
CONFIG_SPI=y

# Start with LEDs on for testing
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=y

# Solid color for debugging (0=solid)
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=0

# Full brightness for testing
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=100

# Set a visible color (pure green, hue=120, sat=100)
CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=120
CONFIG_ZMK_RGB_UNDERGLOW_SAT_START=100

# Auto-off when idle to save battery
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y
